<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hyper Plays • Utils Test Runner</title>
  <style>
    :root {
      --bg:#060815;
      --bg-2:#0b1230;
      --panel:#121c3b;
      --panel-2:#1b2852;
      --text:#f3f8ff;
      --muted:#99add8;
      --good:#4dff98;
      --bad:#ff5f7d;
      --accent:#60e9ff;
      --accent-2:#8d6cff;
      --border:rgba(255,255,255,.12);
    }

    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }

    body {
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% -10%, rgba(96,233,255,.2), transparent 44%),
        radial-gradient(circle at 90% -10%, rgba(141,108,255,.2), transparent 44%),
        linear-gradient(135deg,var(--bg),var(--bg-2));
      padding:22px 14px 36px;
    }

    .shell {
      width:min(940px,96vw);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .panel {
      border:1px solid var(--border);
      background:linear-gradient(165deg, rgba(18,28,59,.9), rgba(18,28,59,.7));
      border-radius:20px;
      padding:16px;
      box-shadow:0 22px 70px rgba(2,6,20,.64);
    }

    .topbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    h1 {
      font:800 clamp(1.2rem,2.5vw,1.8rem)/1.2 "Orbitron",Inter,sans-serif;
      letter-spacing:.04em;
    }

    .actions { display:flex; gap:8px; flex-wrap:wrap; }

    button,
    a {
      border:1px solid var(--border);
      border-radius:999px;
      padding:8px 12px;
      background:rgba(255,255,255,.03);
      color:var(--muted);
      font-size:.76rem;
      font-weight:700;
      text-decoration:none;
      cursor:pointer;
    }

    button:hover,
    a:hover {
      color:#08132a;
      border-color:transparent;
      background:linear-gradient(120deg,var(--accent),var(--accent-2));
    }

    .summary {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
    }

    .stat {
      border:1px solid var(--border);
      border-radius:12px;
      background:var(--panel-2);
      padding:12px;
    }

    .stat p { color:var(--muted); font-size:.8rem; }
    .stat h2 { font-size:1.3rem; margin-top:6px; }

    .good { color:var(--good); }
    .bad { color:var(--bad); }

    ul {
      list-style:none;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    li {
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px;
      background:var(--panel-2);
      font-size:.9rem;
    }

    .line-pass { border-left:4px solid var(--good); }
    .line-fail { border-left:4px solid var(--bad); }
  </style>
</head>
<body>
  <div class="shell">
    <header class="panel topbar">
      <h1>Utility Test Runner</h1>
      <nav class="actions" aria-label="Test runner actions">
        <a href="../index.html">Home</a>
        <a href="../portal.html">Portal</a>
        <button id="rerun" type="button">Run Again</button>
      </nav>
    </header>

    <section class="panel summary" aria-label="Test summary">
      <article class="stat"><p>Total</p><h2 id="total">0</h2></article>
      <article class="stat"><p>Passed</p><h2 id="passed" class="good">0</h2></article>
      <article class="stat"><p>Failed</p><h2 id="failed" class="bad">0</h2></article>
      <article class="stat"><p>Status</p><h2 id="status">Ready</h2></article>
    </section>

    <section class="panel">
      <ul id="results" aria-live="polite"></ul>
    </section>
  </div>

  <script type="module">
    import { rectsCollide, clamp, randInt } from '../shared/utils.js';

    const results = document.getElementById('results');
    const totalEl = document.getElementById('total');
    const passedEl = document.getElementById('passed');
    const failedEl = document.getElementById('failed');
    const statusEl = document.getElementById('status');
    const rerunBtn = document.getElementById('rerun');

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message || 'Assertion failed');
      }
    }

    function line(message, isPass) {
      const li = document.createElement('li');
      li.className = isPass ? 'line-pass' : 'line-fail';
      li.textContent = message;
      results.appendChild(li);
    }

    function runSuite() {
      results.innerHTML = '';
      let passed = 0;
      let failed = 0;

      const tests = [
        ['rectsCollide overlapping', () => assert(rectsCollide({x:0,y:0,w:10,h:10},{x:5,y:5,w:10,h:10}) === true, 'should collide')],
        ['rectsCollide separated', () => assert(rectsCollide({x:0,y:0,w:10,h:10},{x:20,y:20,w:5,h:5}) === false, 'should not collide')],
        ['clamp inside', () => assert(clamp(5,0,10) === 5, 'value mismatch')],
        ['clamp below', () => assert(clamp(-2,0,10) === 0, 'below range mismatch')],
        ['clamp above', () => assert(clamp(20,0,10) === 10, 'above range mismatch')],
        ['randInt range', () => {
          for (let i = 0; i < 50; i += 1) {
            const value = randInt(1,3);
            assert(value >= 1 && value <= 3, 'out of range');
          }
        }]
      ];

      tests.forEach(([name, fn]) => {
        try {
          fn();
          passed += 1;
          line(`PASS • ${name}`, true);
        } catch (error) {
          failed += 1;
          line(`FAIL • ${name} → ${error.message}`, false);
        }
      });

      const total = passed + failed;
      totalEl.textContent = String(total);
      passedEl.textContent = String(passed);
      failedEl.textContent = String(failed);
      statusEl.textContent = failed === 0 ? 'All Green' : 'Failures Found';
      statusEl.className = failed === 0 ? 'good' : 'bad';
    }

    rerunBtn.addEventListener('click', runSuite);
    runSuite();
  </script>
</body>
</html>
